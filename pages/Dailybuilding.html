<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diário de Obra</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/PatternStyle.css">
  <link rel="stylesheet" href="../css/DailyBuilding.css">
</head>

<body>
  <header>
    <div class="header-container">
      <h1>Projeto Residencial XYZ</h1>
    </div>
  </header>

  <main>
    <section class="diary-section">
      <div class="card">
        <div class="image-gallery">
          <div class="image-placeholder"></div>
          <div class="image-caption"></div> <!-- legenda separada -->
          <div class="gallery-controls">
            <button class="prev-btn">Anterior</button>
            <button class="next-btn">Próxima</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-container">
      <button class="home-btn">Página Inicial</button>
    </div>
  </footer>

  <script src="../js/DailyBuilding.js"></script>
  <script src="../js/Main.js"></script>

</body>

</html>
