<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Inicial - Projeto Residencial XYZ</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/PatternStyle.css">
  <link rel="stylesheet" href="../css/InitialPage.css">
</head>

<body>
  <header>
    <div class="header-container">
      <h1>Projeto Residencial XYZ</h1>
    </div>
  </header>

  <main>
    <section class="project-info">
      <h2>Datas da Obra</h2>
      <div class="info-group">
        <label for="start-date">Data de Início da Obra</label>
        <input type="date" id="start-date" name="start-date" value="2026-01-15" readonly>
      </div>
      <div class="info-group">
        <label for="end-date">Data Prevista para Conclusão</label>
        <input type="date" id="end-date" name="end-date" value="2026-12-20" readonly>
      </div>
    </section>

    <!-- Seção de navegação -->
    <section class="navigation-section">
      <h2 class="title-h2">Menu</h2>
      <nav class="icon-grid">
        <div class="icon-item">
          <button data-page="daily">Diário da Obra</button>
        </div>
        <div class="icon-item">
          <button data-page="documents">Documentos</button>
        </div>
        <div class="icon-item">
          <button data-page="finances">Financeiro</button>
        </div>
        <div class="icon-item">
          <button data-page="contact">Fale Conosco</button>
        </div>
      </nav>
    </section>
  </main>

  <footer>
    <div class="footer-container">
      <button class="logout-btn">Encerrar Sessão</button>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="../js/Main.js"></script>
  <script src="../js/InitialPage.js"></script>
</body>

</html>
