<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Inicial</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/PatternStyle.css">
  <link rel="stylesheet" href="../css/InitialPage.css">
</head>

<body>
  <header>
    <div class="header-container">
      <h1>Projeto Residencial XYZ</h1>
    </div>
  </header>

  <main>
    <section class="project-info">
      <div class="info-group">
        <label for="start-date">Data de Início da Obra</label>
        <input type="date" id="start-date" name="start-date" value="2026-01-15" readonly>
      </div>
      <div class="info-group">
        <label for="end-date">Data Prevista para Conclusão</label>
        <input type="date" id="end-date" name="end-date" value="2026-12-20" readonly>
      </div>
    </section>

    <section class="navigation-icons">
      <div class="card">
        <div class="icon-grid">
          <div class="icon-item">
            <button>Diário da Obra</button>
          </div>
          <div class="icon-item">
            <button>Documentos</button>
          </div>
          <div class="icon-item">
            <button>Financeiro</button>
          </div>
          <div class="icon-item">
            <button>Fale Conosco</button>
          </div>
        </div>
      </div>
    </section>
  </main>


  <footer>
    <div class="footer-container">
      <button class="logout-btn">Encerrar Sessão</button>
    </div>
  </footer>

  <script src="../js/InitialPage.js"></script>

</body>

</html>
