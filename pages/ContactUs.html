<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fale Conosco</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/PatternStyle.css">
  <link rel="stylesheet" href="../css/ContactUs.css">
</head>

<body>
  <header>
    <div class="header-container">
      <h1>Projeto Residencial XYZ</h1>
    </div>
  </header>

  <main>
    <section class="contact-section">
      <div class="card">
        <h2>Deixe sua mensagem:</h2>
        <form class="contact-form">
          <div class="form-group">
            <textarea id="mensagem" name="mensagem" rows="6" placeholder="Digite sua mensagem aqui..."></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="send-btn">Enviar</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-container">
      <button class="home-btn">Página Inicial</button>
    </div>
  </footer>

  <script src="../js/ContactUs.js"></script>

</body>

</html>
