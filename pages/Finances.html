<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/PatternStyle.css">
  <link rel="stylesheet" href="../css/Finances.css">
</head>

<body>
  <header>
    <div class="header-container">
      <h1>Projeto Residencial XYZ</h1>
    </div>
  </header>

  <main>
    <section class="finance-section">
      <div class="card">
        <div class="finance-info">
          <div class="info-group">
            <label for="valor-total">Valor Total Estimado:</label>
            <input type="number" id="valor-total" name="valor-total" step="0.01">
          </div>
          <div class="info-group">
            <label for="valor-real">Valor Real:</label>
            <input type="number" id="valor-real" name="valor-real" step="0.01">
          </div>
        </div>

        <div class="boletos">
          <h2>Boletos a serem pagos</h2>
          <ul>
            <li>Boleto1.pdf</li>
            <li>Boleto2.pdf</li>
            <li>Boleto3.pdf</li>
          </ul>
        </div>
      </div>
    </section>
  </main>


  <footer>
    <div class="footer-container">
      <button class="home-btn">Página Inicial</button>
    </div>
  </footer>
</body>

</html>
