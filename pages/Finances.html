<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/PatternStyle.css">
  <link rel="stylesheet" href="../css/Finances.css">
</head>

<body>
  <header>
    <div class="header-container">
      <h1>Projeto Residencial XYZ</h1>
    </div>
  </header>

  <main>
    <section class="exchange-section">
      <h2>Cotações em Tempo Real</h2>
      <div class="exchange-info">Carregando cotações...</div>
    </section>

    <section class="finance-section">
      <div class="card">
        <div class="finance-info">
          <h2>Controle Financeiro</h2>
          <div class="form-group">
            <label for="estimated">Valor Estimado</label>
            <input type="text" id="estimated" value="R$ 150.000,00" readonly>
          </div>
          <div class="form-group">
            <label for="real">Valor Real</label>
            <input type="text" id="real" value="R$ 165.000,00" readonly>
          </div>
          <div class="result">
            <p id="difference">Diferença: R$ 0,00</p>
          </div>

        </div>

        <div class="boletos">
          <h2>Boletos a serem pagos</h2>
          <ul>
            <li>Boleto1.pdf</li>
            <li>Boleto2.pdf</li>
            <li>Boleto3.pdf</li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-container">
      <button class="home-btn">Página Inicial</button>
    </div>
  </footer>

  <script src="../js/Finances.js"></script>
  <script src="../js/Main.js"></script>

</body>

</html>
